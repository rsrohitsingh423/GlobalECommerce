<h1>Mock Payment</h1>

<mat-card>

    <p>

        Amount

        <strong>

            ₹ {{cart.totalAmount()}}

        </strong>

    </p>

    <br>

    <button
        mat-raised-button
        color="primary"
        [disabled]="processing"
        (click)="pay()">

        {{processing ? 'Processing...' : 'Pay Now'}}

    </button>

    <button
        mat-button
        color="warn"
        (click)="cancel()">

        Cancel

    </button>

</mat-card>
